name: CI - Build Check

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

  website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Run tests with coverage
        run: ./gradlew :SeforimApp:jvmTest :SeforimApp:koverXmlReport :SeforimApp:koverHtmlReport --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: |
            **/build/reports/kover/
          retention-days: 7

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (DEB)
          - os: ubuntu-latest
            arch: amd64
            build_task: ":SeforimApp:packageReleaseDeb"

          # Windows x64
          - os: windows-latest
            arch: amd64
            build_task: ":SeforimApp:packageGraalvmNsis"

          # macOS Apple Silicon (ARM64)
          - os: macos-latest
            arch: arm64
            build_task: ":SeforimApp:packageReleaseDmg"

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      # Build
      - name: Build on Linux
        if: runner.os == 'Linux'
        run: ./gradlew :SeforimApp:createReleaseDistributable ${{ matrix.build_task }} --no-daemon

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat ${{ matrix.build_task }} --no-daemon

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: ./gradlew :SeforimApp:createReleaseDistributable ${{ matrix.build_task }} --no-daemon

      # Build Rust installer for Windows
      - name: Install Rust toolchain
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd installer

          # Create resources directory
          New-Item -ItemType Directory -Force -Path resources | Out-Null

          # Copy splash image
          Copy-Item "..\SeforimApp\src\jvmMain\assets\common\splash.png" "resources\splash.png"

          # Find and copy NSIS installer
          $nsisFile = Get-ChildItem "..\SeforimApp\build\compose\binaries\main\graalvm-nsis\zayit-*-nsis.exe" | Select-Object -First 1
          if (-not $nsisFile) {
            Write-Error "NSIS installer not found"
            exit 1
          }
          Copy-Item $nsisFile.FullName "resources\zayit-nsis.exe"
          $nsisBaseName = $nsisFile.BaseName
          Write-Host "Found NSIS: $nsisBaseName"

          # Build Rust installer
          cargo build --release --target x86_64-pc-windows-msvc

          # Rename exe to match NSIS name
          $exeName = "$nsisBaseName.exe"
          Move-Item "target\x86_64-pc-windows-msvc\release\zayit-installer.exe" "target\x86_64-pc-windows-msvc\release\$exeName"
          Write-Host "Built installer: $exeName"

      - name: Build summary
        run: echo "Build completed successfully for ${{ matrix.os }} (${{ matrix.arch }})"
        shell: bash
