name: Build and Release Compose Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (DEB) - GraalVM
          - os: ubuntu-latest
            arch: amd64
            pkg: deb
            graalvm: true

          # Linux ARM64 (DEB) - GraalVM
          - os: ubuntu-24.04-arm
            arch: arm64
            pkg: deb
            graalvm: true

          # Linux x64 (RPM) - GraalVM
          - os: ubuntu-latest
            arch: amd64
            pkg: rpm
            graalvm: true

          # Linux ARM64 (RPM) - GraalVM
          - os: ubuntu-24.04-arm
            arch: arm64
            pkg: rpm
            graalvm: true

          # Linux x64 (Pacman) - GraalVM
          - os: ubuntu-latest
            arch: amd64
            pkg: pacman
            graalvm: true

          # Linux ARM64 (Pacman) - GraalVM
          - os: ubuntu-24.04-arm
            arch: arm64
            pkg: pacman
            graalvm: true

          # Windows x64 - GraalVM
          - os: windows-latest
            arch: amd64
            rust_target: x86_64-pc-windows-msvc
            graalvm: true

          # Windows ARM64 - JBR (no Liberica NIK available)
          - os: windows-11-arm
            arch: arm64
            rust_target: aarch64-pc-windows-msvc
            graalvm: false

          # macOS Apple Silicon (ARM64) - GraalVM
          - os: macos-26
            jdk_arch: aarch64
            graalvm: true

          # macOS Intel (x64) - GraalVM
          - os: macos-26-intel
            jdk_arch: x64
            graalvm: true

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Normalize version for manual runs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          tag=$(git describe --tags --abbrev=0)
          echo "Using latest tag for version: $tag"
          echo "GITHUB_REF=refs/tags/$tag" >> "$GITHUB_ENV"

      - name: Compute version and asset name
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"
          case "${{ matrix.os }}" in
            ubuntu*)  plat=linux ;;
            windows*) plat=windows ;;
            macos*)   plat=macos ;;
            *)        plat=unknown ;;
          esac
          # deb and rpm share the same arch on the same runner — keep the pkg suffix so artifact names stay unique.
          pkg_suffix=""
          if [ -n "${{ matrix.pkg }}" ]; then pkg_suffix="-${{ matrix.pkg }}"; fi
          # generate-update-yml infers the platform from the artifact dir name (must contain linux/macos/windows).
          echo "ASSET_NAME=release-assets-${plat}-${{ matrix.arch || matrix.jdk_arch }}${pkg_suffix}" >> "$GITHUB_ENV"

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@789704a9b63c5b2a0ff4d6e1cd85711ab2e4286b

      - name: Setup GraalVM (Liberica NIK)
        if: matrix.graalvm
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'

      # Linux builds
      - name: Build & stage Linux .deb
        if: startsWith(matrix.os, 'ubuntu') && matrix.pkg == 'deb'
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :SeforimApp:packageGraalvmDeb
          mkdir -p staging
          src="$(find SeforimApp/build/compose/binaries/main/graalvm-deb -name '*.deb' | head -n1)"
          [ -n "$src" ] || { echo "::error::No .deb produced"; exit 1; }
          # Name kept in sync with website/public/download/launch.linux deb pattern.
          cp "$src" "staging/zayit_${VERSION}_${{ matrix.arch }}.deb"

      - name: Build & stage Linux .rpm
        if: startsWith(matrix.os, 'ubuntu') && matrix.pkg == 'rpm'
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :SeforimApp:packageGraalvmRpm
          mkdir -p staging
          src="$(find SeforimApp/build/compose/binaries/main/graalvm-rpm -name '*.rpm' | head -n1)"
          [ -n "$src" ] || { echo "::error::No .rpm produced"; exit 1; }
          case "${{ matrix.arch }}" in
            amd64) rpm_arch=x86_64 ;;
            arm64) rpm_arch=aarch64 ;;
            *)     rpm_arch="${{ matrix.arch }}" ;;
          esac
          # Name kept in sync with website/public/download/launch.linux rpm pattern.
          cp "$src" "staging/zayit-${VERSION}-1.${rpm_arch}.rpm"

      - name: Build & stage Linux .pacman
        if: startsWith(matrix.os, 'ubuntu') && matrix.pkg == 'pacman'
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :SeforimApp:packageGraalvmPacman
          mkdir -p staging
          # Nucleus emits the Arch package with a .pacman extension.
          src="$(find SeforimApp/build/compose/binaries/main/graalvm-pacman -name '*.pacman' | head -n1)"
          [ -n "$src" ] || { echo "::error::No pacman package produced"; exit 1; }
          case "${{ matrix.arch }}" in
            amd64) pac_arch=x86_64 ;;
            arm64) pac_arch=aarch64 ;;
            *)     pac_arch="${{ matrix.arch }}" ;;
          esac
          cp "$src" "staging/zayit-${VERSION}-1-${pac_arch}.pacman"

      # Windows GraalVM build (x64)
      - name: Build Windows NSIS installer (GraalVM)
        if: startsWith(matrix.os, 'windows') && matrix.graalvm
        shell: pwsh
        run: .\gradlew.bat :SeforimApp:packageGraalvmNsis

      # Windows JBR build (ARM64)
      - name: Build Windows NSIS installer (JBR)
        if: startsWith(matrix.os, 'windows') && !matrix.graalvm
        shell: pwsh
        run: .\gradlew.bat :SeforimApp:createReleaseDistributable :SeforimApp:packageReleaseNsis

      - name: Install Rust toolchain
        if: startsWith(matrix.os, 'windows')
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build Rust wrapper and stage Windows assets
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $wtok = if ('${{ matrix.arch }}' -eq 'amd64') { 'x64' } else { 'arm64' }
          $ver = $env:VERSION

          $nsis = Get-ChildItem `
            "SeforimApp\build\compose\binaries\main\graalvm-nsis\zayit-*-nsis.exe", `
            "SeforimApp\build\compose\binaries\main-release\nsis\zayit-*-nsis.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsis) { Write-Error "NSIS installer not found"; exit 1 }

          New-Item -ItemType Directory -Force staging | Out-Null

          # Raw NSIS (silent oneClick) — consumed by the auto-updater only.
          Copy-Item $nsis.FullName "staging\Zayit-$ver-windows-$wtok-nsis.exe"

          # Rust wrapper installer (splash UI) embeds and runs the NSIS silently — this is the user-facing download.
          Push-Location installer
          New-Item -ItemType Directory -Force resources | Out-Null
          Copy-Item "..\SeforimApp\src\jvmMain\assets\common\splash.png" "resources\splash.png"
          Copy-Item $nsis.FullName "resources\zayit-nsis.exe"
          cargo build --release --target ${{ matrix.rust_target }}
          Pop-Location
          Copy-Item "installer\target\${{ matrix.rust_target }}\release\zayit-installer.exe" "staging\Zayit-$ver-windows-$wtok.exe"

      # macOS builds (GraalVM): .dmg (download) + .zip (auto-update)
      - name: Build & stage macOS .dmg + .zip
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          # .dmg = manual download, .zip (+ .blockmap) = auto-update feed. Both are
          # built by Gradle and shipped under electron-builder's own versioned names
          # (no renaming): latest-mac.yml is regenerated from them downstream, and
          # launch.mac / the website resolve the assets via the GitHub API, so no
          # fixed filename is needed. The .blockmap powers differential auto-updates.
          ./gradlew :SeforimApp:packageGraalvmDmg :SeforimApp:packageGraalvmZip
          mkdir -p staging

          SEARCH_ROOT="SeforimApp/build/compose/binaries/main"
          find "$SEARCH_ROOT/graalvm-dmg" -name '*.dmg' -exec cp {} staging/ \;
          find "$SEARCH_ROOT/graalvm-zip" \( -name '*.zip' -o -name '*.zip.blockmap' \) -exec cp {} staging/ \;

          ls staging/*.dmg >/dev/null 2>&1 || { echo "::error::No .dmg produced"; exit 1; }
          ls staging/*.zip >/dev/null 2>&1 || { echo "::error::No .zip produced"; exit 1; }

      - name: Upload release assets
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ASSET_NAME }}
          path: staging/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout (for tag/notes context)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine tag and version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="$(git describe --tags --abbrev=0)"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Download all release assets
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: release-assets-*

      - name: List downloaded files
        run: ls -R artifacts

      # Recomputes sha512/size from the actual files and merges per-platform feeds
      # (latest.yml / latest-mac.yml / latest-linux.yml) — handles multi-arch and the
      # Rust-wrapped exe / manual macOS zip correctly since it hashes the final assets.
      - name: Generate auto-update feeds (latest*.yml)
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: artifacts
          version: ${{ env.VERSION }}
          channel: latest

      # Creates/updates the GitHub release and uploads every installer + the consolidated feeds.
      - name: Create release and upload installers + feeds
        uses: kdroidFilter/Nucleus/.github/actions/publish-release@main
        with:
          artifacts-path: artifacts
          tag: ${{ env.TAG }}
          release-type: release
